# Install tpm if it doesn't exist
if "test ! -d '#{@tmux_plugin_dir}/tpm'" \
   "run 'git clone https://github.com/tmux-plugins/tpm #{@tmux_plugin_dir}/tpm && #{@tmux_plugin_dir}/tpm/bin/install_plugins'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-processes 'ssh psql mysql sqlite3 mongod redis-server ~node irb "~rails server" "~rails console"'
set -g @continuum-restore 'on'

# Source modular tmux config files if they exist
if-shell '[ -f "$HOME/.config/tmux/options.conf" ]' 'source-file "$HOME/.config/tmux/options.conf"'
if-shell '[ -f "$HOME/.config/tmux/keybinds.conf" ]' 'source-file "$HOME/.config/tmux/keybinds.conf"'
if-shell '[ -f "$HOME/.config/tmux/tmux.conf.local" ]' 'source-file "$HOME/.config/tmux/tmux.conf.local"'
if-shell '[ -f "$HOME/.config/tmux/theme.conf" ]' 'source-file "$HOME/.config/tmux/theme.conf"'

run '#{@tmux_plugin_dir}/tpm/tpm'
